<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tambah Event</title>
    <link rel="stylesheet" href="post.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="brand">
                <img src="Group 9.png" alt="Logo" class="logo">
                <h2>Pawarti</h2>
            </div>

            <nav class="menu">
                <a href="webTUY.html #beranda"><i class="icon"><img src="berandaicon.png" alt="beranda"> </i> Beranda</a>
                <a href="#"><i class="icon"><img src="datewhite.png" alt="kalender"></i> Kalender Event</a>
                <a href="#" class="active"><i class="icon"><img src="addicon.png" alt="tambahkan"></i> Tambahkan Event</a>
                <a href="#"><i class="icon"><img src="outicon.png" alt="keluar akun"></i> Keluar dari akun</a>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="content">
            <h1>Tambahkan Event Di Kota Mu</h1>

            <button class="tab-btn">Informasi</button>

            <div class="form-card">

                <div class="form-grid">
                    <div class="form-group">
                        <label>Nama</label>
                        <input type="text" placeholder="Masukkan Nama Event">
                    </div>

                    <div class="form-group">
                        <label>Masukkan Lokasi</label>
                        <input type="text" placeholder="Tuliskan Lokasi Event">
                    </div>

                    <div class="form-group">
                        <label>Harga Tiket</label>
                        <input type="text" placeholder="Tuliskan Harga Ticket Event">
                    </div>

                    <div class="form-group">
                        <label>Kategori</label>
                        <input type="text" placeholder="Tuliskan Kategori Event">
                    </div>
                </div>

                <div class="form-group full">
                    <label>Deskripsi</label>
                    <textarea placeholder="Tuliskan Deskripsi atau keterangan lain tentang event yang akan diselenggarakan"></textarea>
                </div>

                <div class="upload-box">
                    <img src="pictureicon.png" class="upload-icon">
                    <span>Tambahkan Gambar Event</span>
                </div>

                <button class="submit-btn">Kirim</button>
            </div>

        </main>
    </div>
</body>
</html>
